services:
  backend:
    build: ./backend
    ports:
      - "7860:7860"
    volumes:
      - acacia-data:/data
    environment:
      - DB_PATH=/data/acacia.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_FILE=/data/.jwt_secret
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_DATA_MODE=backend
        - VITE_BACKEND_URL=http://localhost:7860
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  acacia-data:
