worker_processes 1;

events {
    worker_connections 256;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Main site (also default server for unmatched hostnames)
    server {
        listen 80 default_server;
        server_name tandyblow.top acacia.tandyblow.top;
        client_max_body_size 11m;

        # AI-generated background images (runtime-generated, not in dist)
        location /backgrounds/ {
            root /opt/acacia/frontend/public;
        }

        # Frontend entry files and Service Worker must revalidate on deploy.
        location ~* ^/(index\.html|admin\.html|manifest\.json|sw\.js)$ {
            root /opt/acacia/frontend/dist;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        # Vite assets include content hashes, so they are safe to cache long-term.
        location /assets/ {
            root /opt/acacia/frontend/dist;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            try_files $uri =404;
        }

        # Frontend static files
        location / {
            root /opt/acacia/frontend/dist;
            index index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri $uri/ /index.html;
        }

        # API proxy to FastAPI
        location /api/ {
            proxy_pass http://127.0.0.1:7860/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin subdomain
    server {
        listen 80;
        server_name admin.tandyblow.top;
        client_max_body_size 11m;

        # Frontend entry files and Service Worker must revalidate on deploy.
        location ~* ^/(index\.html|admin\.html|manifest\.json|sw\.js)$ {
            root /opt/acacia/frontend/dist;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        # Vite assets include content hashes, so they are safe to cache long-term.
        location /assets/ {
            root /opt/acacia/frontend/dist;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            try_files $uri =404;
        }

        location / {
            root /opt/acacia/frontend/dist;
            index admin.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri $uri/ /admin.html;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:7860/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
